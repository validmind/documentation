name: Lighthouse Audit

on:
  pull_request:
    types: [ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Lighthouse CI
      run: npm install -g @lhci/cli

    - name: Run Lighthouse CI
      id: lhci
      run: |
        lhci autorun --config=.lighthouserc.js || {
          echo "Lighthouse audit failed"
          exit 1
        }

    - name: Upload Lighthouse report as artifact
      uses: actions/upload-artifact@v3
      with:
        name: lighthouse-report
        path: .lighthouseci/
        retention-days: 1

    - name: Post Lighthouse results comment
      uses: actions/github-script@v6
      with:
        script: |
          const runId = context.runId;
          const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}/artifacts`;
          
          // Get the score from the LHCI output
          const score = '${{ steps.lhci.outputs.score }}';
          const passed = parseFloat(score) >= 0.9;
          
          let comment = '## Lighthouse audit results\n\n';
          
          if (passed) {
            comment += `✅ Accessibility score: ${score}\n\n`;
          } else {
            comment += `⚠️ Accessibility score: ${score} (minimum required: 0.9)\n\n`;
          }
          
          comment += `View the [full report](${artifactUrl}) in the workflow artifacts`;
          
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
          }); 