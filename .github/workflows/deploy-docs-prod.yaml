name: Deploy docs site to production

on:
  push:
    branches:
      - prod
  workflow_run:
    workflows: ["Merge staging into prod"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-docs-production
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Check out documentation repository
        uses: actions/checkout@v4

      - name: Find production artifact for this source tree
        id: production-artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          name="docs-production-$(git rev-parse 'HEAD^{tree}')"
          echo "name=$name" >> "$GITHUB_OUTPUT"

          run_id=""
          while read -r candidate; do
            [[ -z "$candidate" ]] && continue
            run=$(gh api "repos/${{ github.repository }}/actions/runs/$candidate")
            run_path=$(jq -r .path <<< "$run")
            conclusion=$(jq -r .conclusion <<< "$run")
            if [[ "$run_path" == ".github/workflows/deploy-docs-staging.yaml" && "$conclusion" == "success" ]]; then
              run_id="$candidate"
              break
            fi
            echo "Ignoring $name from untrusted or unsuccessful workflow run $candidate ($run_path: $conclusion)"
          done < <(gh api "repos/${{ github.repository }}/actions/artifacts?name=$name&per_page=100" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[].workflow_run.id')

          if [[ -z "$run_id" ]]; then
            echo "::error::No fully validated production artifact named $name was produced by a successful staging workflow. Production was not modified."
            exit 1
          fi

          echo "Found validated $name in staging workflow run $run_id"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download prebuilt production docs
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.production-artifact.outputs.name }}
          path: ${{ runner.temp }}/production-artifact
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.production-artifact.outputs.run_id }}

      - name: Extract prebuilt production docs
        run: |
          mkdir -p site/_site
          tar --zstd -xf "$RUNNER_TEMP/production-artifact/docs-production.tar.zst" -C site/_site

      - name: Verify production artifact contents
        run: |
          test -s site/_site/index.html
          test -s site/_site/search.json
          test -s site/_site/listings.json

      # Prod bucket is in us-east-1
      - name: Configure AWS credentials
        run: aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID_PROD }} && aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }} && aws configure set default.region us-east-1

      - name: Deploy docs prod site
        run: aws s3 sync site/_site s3://validmind-docs-prod/site --delete --exclude "installation/omnibus/*" --exclude "installation/helm-repo/*" --exclude "notebooks/EXECUTED/*" --exclude "llm/*" --cache-control "no-cache, max-age=0, must-revalidate" && aws cloudfront create-invalidation --distribution-id E2BGG3USKQTR9W --paths "/*" --no-cli-pager

      # Release headroom and shrink before final lightweight steps & post-job
      - name: Release reserve & shrink
        if: always()
        uses: ./.github/actions/free-disk-space
        with:
          release_reserve: "true"
          remove_paths: |
            site/_source/installation
            site/_source/release-notes
            site/_source/backend
            site/render_errors.log
            site/_freeze
            dev.env
            valid.env

      - name: Final disk usage
        if: always()
        run: df -hT /
