name: Validate docs site (render, test, and deploy)

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: validate-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
    - name: Check out documentation repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.head_ref }}
        fetch-depth: 1
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check out release-notes repository
      uses: actions/checkout@v4
      with:
        repository: validmind/release-notes
        ref: automated/library-v2.13.5
        path: site/_source/release-notes
        token: ${{ secrets.DOCS_CI_RO_PAT }}
        sparse-checkout: |
          releases
        sparse-checkout-cone-mode: true

    - name: Detect automated release-notes preview
      id: release-preview
      shell: bash
      run: |
        set -euo pipefail
        release_ref=$(git -C site/_source/release-notes for-each-ref \
          --format='%(refname:strip=3)' --points-at HEAD refs/remotes/origin | head -n 1)

        if [[ "$release_ref" != automated/* ]]; then
          echo "fast=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git -C site/_source/release-notes fetch --depth=1 origin main
        : > .release-preview-targets
        git -C site/_source/release-notes diff --name-only --diff-filter=ACMRT FETCH_HEAD HEAD -- releases \
          | awk -F/ 'NF >= 4 { print $1 "/" $2 "/" $3 }' \
          | sort -u > .release-preview-targets

        if [[ ! -s .release-preview-targets ]]; then
          echo "No release directories changed; falling back to full validation."
          echo "fast=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Automated release-notes ref: $release_ref"
        echo "Targeted render directories:"
        cat .release-preview-targets
        echo "fast=true" >> "$GITHUB_OUTPUT"

    - name: Determine preview render scope
      id: preview
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        if [[ "${{ steps.release-preview.outputs.fast }}" == "true" ]]; then
          echo "targeted=true" >> "$GITHUB_OUTPUT"
          echo "mode=release" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        set +e
        gh api --paginate "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" \
          --jq '.[] | [.status, .filename, (.previous_filename // "")] | @tsv' \
          | python3 .github/scripts/select_docs_preview_targets.py \
          --changes - \
          --targets .preview-targets \
          --assets .preview-assets
        selector_status=$?
        set -e

        case "$selector_status" in
          0)
            echo "targeted=true" >> "$GITHUB_OUTPUT"
            echo "mode=docs" >> "$GITHUB_OUTPUT"
            ;;
          3)
            echo "targeted=false" >> "$GITHUB_OUTPUT"
            echo "mode=full" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "Preview target selection failed with status $selector_status"
            exit "$selector_status"
            ;;
        esac

    # Full validation needs generated sources and extra disk headroom. Automated
    # and safely targeted previews reuse the validated staging build instead.
    - name: Free space + create reserve
      if: steps.preview.outputs.targeted != 'true'
      uses: ./.github/actions/free-disk-space
      with:
        remove_dotnet: "true"
        remove_android: "true"
        remove_haskell: "true"
        prune_docker: "true"
        apt_cleanup: "true"
        create_reserve_gb: "3"

    - name: Check out validmind-library repository
      if: steps.preview.outputs.targeted != 'true'
      uses: actions/checkout@v4
      with:
        repository: validmind/validmind-library
        path: site/_source/validmind-library
        token: ${{ secrets.DOCS_CI_RO_PAT }}

    - name: Check out installation repository
      if: steps.preview.outputs.targeted != 'true'
      uses: actions/checkout@v4
      with:
        repository: validmind/installation
        path: site/_source/installation
        token: ${{ secrets.DOCS_CI_RO_PAT }}
        sparse-checkout: |
          site/installation
        sparse-checkout-cone-mode: true

    - name: Check out backend repository
      if: steps.preview.outputs.targeted != 'true'
      uses: actions/checkout@v4
      with:
        repository: validmind/backend
        path: site/_source/backend
        token: ${{ secrets.DOCS_CI_RO_PAT }}
        sparse-checkout: |
          src/backend/templates/documentation/model_documentation
        sparse-checkout-cone-mode: true

    - name: Set up uv
      if: steps.preview.outputs.targeted != 'true'
      uses: astral-sh/setup-uv@v5

    - name: Verify copyright headers
      run: |
        cd site
        make verify-copyright

    - name: Set up Quarto
      uses: quarto-dev/quarto-actions/setup@v2
      with:
        version: pre-release

    - name: Test preview selection and index merge
      run: |
        python3 -m unittest discover -s .github/scripts -p 'test_select_docs_preview_targets.py' -v
        python3 -m unittest discover -s .github/scripts -p 'test_merge_quarto_indexes.py' -v

    - name: Generate Python library docs
      if: steps.preview.outputs.targeted != 'true'
      run: |
        cd site/_source/validmind-library
        make install && make quarto-docs
        cd ../../
        rm -rf validmind
        mkdir -p validmind
        rsync -av --exclude '_build' --exclude 'templates' _source/validmind-library/docs/ validmind/

    - name: Generate template schema docs
      if: steps.preview.outputs.targeted != 'true'
      run: |
        BACKEND_ROOT=site/_source/backend uv run --with json-schema-for-humans python scripts/generate_template_schema_docs.py

    - name: Populate installation
      if: steps.preview.outputs.targeted != 'true'
      run: cp -r site/_source/installation/site/installation site/installation

    - name: Populate release notes
      run: |
        cp -r site/_source/release-notes/releases site
        rm -f site/releases/backend-releases.qmd site/releases/cmvm-releases.qmd

    # The staging HTML lets Quarto resolve descriptions for listings without
    # re-rendering the other ~1,000 pages. Only HTML and the two global indexes
    # are downloaded; the final preview is cloned server-side during deployment.
    - name: Configure AWS credentials
      run: aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }} && aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }} && aws configure set default.region us-east-1

    - name: Seed targeted render from staging
      if: steps.preview.outputs.targeted == 'true'
      run: |
        mkdir -p site/_site/releases site/.preview-indexes site/validmind
        # The navbar links to this generated source file. The complete rendered
        # Python API is reused from staging; this placeholder only lets Quarto
        # resolve the link while rendering release pages.
        touch site/validmind/validmind.qmd
        aws s3 cp s3://validmind-docs-staging/site/search.json site/.preview-indexes/search.json --no-progress
        aws s3 cp s3://validmind-docs-staging/site/listings.json site/.preview-indexes/listings.json --no-progress

    - name: Seed release listing descriptions from staging
      if: steps.preview.outputs.mode == 'release'
      run: |
        aws s3 sync s3://validmind-docs-staging/site/releases site/_site/releases \
          --exclude "*" --include "*.html" --no-progress

    - name: Render targeted release preview
      if: steps.preview.outputs.mode == 'release'
      run: |
        cd site
        : > render_errors.log
        while read -r target; do
          quarto render --profile development "$target" 2>&1 | tee -a render_errors.log || {
          echo "Quarto render failed immediately";
          cat render_errors.log;
          exit 1;
          }
        done < ../.release-preview-targets

        for target in releases/*.qmd; do
          [[ "$(basename "$target")" == _* ]] && continue
          quarto render --profile development "$target" 2>&1 | tee -a render_errors.log || {
            echo "Quarto render failed immediately";
            cat render_errors.log;
            exit 1;
          }
        done

        python3 ../.github/scripts/merge_quarto_indexes.py \
          --base-search .preview-indexes/search.json \
          --partial-search _site/search.json \
          --base-listings .preview-indexes/listings.json \
          --partial-listings _site/listings.json

    - name: Render targeted documentation preview
      if: steps.preview.outputs.mode == 'docs'
      run: |
        cd site
        : > render_errors.log
        while read -r target; do
          quarto render --profile development "$target" 2>&1 | tee -a render_errors.log || {
            echo "Quarto render failed immediately"
            cat render_errors.log
            exit 1
          }
        done < ../.preview-targets

        while read -r asset; do
          [[ -z "$asset" ]] && continue
          install -D "$asset" "_site/$asset"
        done < ../.preview-assets

        python3 ../.github/scripts/merge_quarto_indexes.py \
          --base-search .preview-indexes/search.json \
          --partial-search _site/search.json \
          --base-listings .preview-indexes/listings.json \
          --partial-listings _site/listings.json

    - name: Render demo docs site
      if: steps.preview.outputs.targeted != 'true'
      run: |
        cd site
        quarto render --profile development 2>&1 | tee render_errors.log || {
        echo "Quarto render failed immediately";
        cat render_errors.log;
        exit 1;
        }
        make generate-sitemap

    - name: Add robots.txt for PR preview
      run: cp site/environments/robots-staging.txt site/_site/robots.txt

    - name: Test for warnings or errors
      run: |
        if grep -q 'WARN\|WARNING\|ERROR:' site/render_errors.log; then
          echo "Warnings or errors detected during Quarto render"
          cat site/render_errors.log
          exit 1
        else
          echo "No warnings or errors detected during Quarto render"
        fi

    - name: Deploy PR preview
      run: |
        preview_path="s3://validmind-docs-staging/site/pr_previews/${{ github.head_ref }}"
        if [[ "${{ steps.preview.outputs.targeted }}" == "true" ]]; then
          aws s3 sync s3://validmind-docs-staging/site "$preview_path" \
            --delete --exclude "pr_previews/*" --exclude "notebooks/EXECUTED/*" --no-progress
          if [[ "${{ steps.preview.outputs.mode }}" == "release" ]]; then
            aws s3 sync site/_site "$preview_path" \
              --exclude "index.html" --exclude "notebooks/EXECUTED/*" --no-progress \
              --cache-control "no-cache, max-age=0, must-revalidate"
          else
            aws s3 sync site/_site "$preview_path" \
              --exclude "notebooks/EXECUTED/*" --no-progress \
              --cache-control "no-cache, max-age=0, must-revalidate"
          fi
        else
          aws s3 sync site/_site "$preview_path" --delete \
            --exclude "notebooks/EXECUTED/*" \
            --cache-control "no-cache, max-age=0, must-revalidate"
        fi
        aws cloudfront create-invalidation --distribution-id ESWVTZYFL873V --paths "/*" --no-cli-pager

    - name: Post comment with preview URL
      uses: actions/github-script@v6
      with:
        script: |
          const previewUrl = `https://docs-staging.validmind.ai/pr_previews/${{ github.head_ref }}/index.html`;

          // Delete old preview comments
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          for (const comment of comments) {
            if (comment.user.login === 'github-actions[bot]' && comment.body.includes('## Validate docs site')) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: comment.id,
              });
            }
          }

          let comment = `## Validate docs site\n\n`;
          comment += `✓ INFO: A live preview of the docs site is available — [Open the preview](${previewUrl})\n\n`;

          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: comment
          });

    - name: Trigger Lighthouse check
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'lighthouse-check.yaml',
            ref: context.payload.pull_request.head.ref,
            inputs: {
              mode: 'changed',
              depth: '0',
              pr_number: String(context.issue.number),
            },
          });
          console.log(`Dispatched Lighthouse check for PR #${context.issue.number}`);

    - name: Install pandoc
      if: steps.preview.outputs.targeted != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Verify chatbot product map is up to date
      if: steps.preview.outputs.targeted != 'true'
      run: |
        set -euo pipefail
        python3 site/scripts/generate_chatbot_product_map.py

        map_changed=false
        snapshot_changed=false
        git diff --quiet site/llm/chatbot-product-map.md || map_changed=true
        git diff --quiet site/llm/chatbot-product-map-frontend-snapshot.json || snapshot_changed=true

        if [ "$map_changed" = false ] && [ "$snapshot_changed" = false ]; then
          echo "chatbot product map is up to date"
          exit 0
        fi

        if [ "$snapshot_changed" = true ]; then
          echo "::error::Frontend snapshot is stale. Run: make -C site refresh-chatbot-product-map (requires ../frontend checkout), then commit site/llm/chatbot-product-map-frontend-snapshot.json and site/llm/chatbot-product-map.md."
          exit 1
        fi

        if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
          echo "::error::chatbot-product-map.md is stale for this fork PR. Run: make -C site generate-chatbot-product-map, then commit site/llm/chatbot-product-map.md."
          exit 1
        fi

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add site/llm/chatbot-product-map.md
        git commit -m "chore: refresh chatbot product map"
        git push origin "HEAD:${{ github.head_ref }}"
        echo "Auto-committed refreshed site/llm/chatbot-product-map.md."

    - name: Test chatbot product map generator
      if: steps.preview.outputs.targeted != 'true'
      run: python3 -m unittest discover -s site/scripts -p 'test_generate_chatbot_product_map.py' -v

    - name: Validate LLM markdown render
      if: steps.preview.outputs.targeted != 'true'
      run: bash llm/render.sh && bash llm/clean.sh
      working-directory: site

    - name: Verify LLM corpus includes product map and docs IA hub
      if: steps.preview.outputs.targeted != 'true'
      run: |
        test -f site/llm/_llm-output/chatbot-product-map.md
        test -f site/llm/_llm-output/AGENTS.md
        test -f site/llm/_llm-output/about/using-the-documentation.md
        test ! -f site/llm/_llm-output/about/contributing/validmind-community.md
        test ! -d site/llm/_llm-output/about/contributing/style-guide

    # Release headroom and shrink before final lightweight steps & post-job
    - name: Release reserve & shrink
      if: always()
      uses: ./.github/actions/free-disk-space
      with:
        release_reserve: "true"
        remove_paths: |
          site/_source/installation
          site/_source/release-notes
          site/_source/backend
          site/render_errors.log
          site/_freeze
          dev.env
          valid.env

    - name: Final disk usage
      if: always()
      run: df -hT /
