# Standalone Quarto project for rendering Markdown for LLM / LanceDB ingestion.
# Usage: cd site/llm && quarto render

project:
  type: default
  output-dir: _llm-output
  render:
    - "../**/*.qmd"
    - "!../notebooks/"
    - "!../404.qmd"
    - "!../about/contributing/"
    - "!../about/deployment/"
    - "!../about/fine-print/"
    - "!../_site/"
    - "!../_llm-output/"

format:
  gfm:
    toc: false
    number-sections: false
    wrap: none
    code-fold: false
    code-tools: false

execute:
  enabled: false
